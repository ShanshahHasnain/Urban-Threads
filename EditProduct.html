<!DOCTYPE html>
<html lang="en">


<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>
        Edit Product - Urban Threads Admin
    </title>


    <link rel="stylesheet" href="EditProduct.css">


</head>



<body>


    <div class="product-form">



        <h1>
            Edit Product
        </h1>




        <input type="text" id="productName" placeholder="Product Name">





        <input type="text" id="productCategory" placeholder="Category">





        <input type="number" id="productPrice" placeholder="Price">





        <input type="number" id="productStock" placeholder="Stock">





        <input type="file" id="productImage" accept="image/*">


        <img id="currentProductImage" style="width:120px;margin:10px 0;" alt="Current Image">





        <textarea id="productDescription" placeholder="Product Description">
</textarea>





        <button id="updateProductBtn">

            Update Product

        </button>



    </div>




    <script type="module" src="EditProduct.js"></script>



</body>


</html>
