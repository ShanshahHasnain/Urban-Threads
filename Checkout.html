<!DOCTYPE html>
<html>

<head>

    <title>
        Checkout - Urban Threads
    </title>

    <link rel="stylesheet" href="Checkout.css">

</head>


<body>


    <h1>
        Checkout
    </h1>


    <div class="checkout-box">


        <input id="customerName" placeholder="Full Name">


        <input id="customerPhone" placeholder="Phone Number">


        <textarea id="customerAddress" placeholder="Complete Address">
</textarea>



        <h3>
            Order Summary
        </h3>


        <div id="orderSummary">

        </div>



        <h2>
            Total:
            <span id="checkoutTotal">
                0
            </span>
        </h2>

        <!-- ===============================
Payment Method
=============================== -->

        <div class="payment-section">

            <h3>
                Payment Method
            </h3>

            <label class="payment-option">

                <input type="radio" name="paymentMethod" value="cod" checked>

                Cash on Delivery

            </label>

            <label class="payment-option">

                <input type="radio" name="paymentMethod" value="jazzcash">

                JazzCash

            </label>

        </div>


        <!-- ===============================
JazzCash Section
=============================== -->

        <div id="jazzcashSection" class="jazzcash-section" style="display:none;">

            <h3>

                JazzCash Payment

            </h3>

            <img id="jazzcashQR" src="images/jazzcash-placeholder.png" alt="JazzCash QR Code" class="qr-image">

            <p>

                <strong>

                    Account Title:

                </strong>

                Urban Threads

            </p>

            <p>

                <strong>

                    JazzCash Number:

                </strong>

                03XXXXXXXXX

            </p>

            <p>

                After completing payment,

                upload your payment receipt.

            </p>

            <input type="file" id="paymentReceipt" accept="image/*">

        </div>



        <button id="placeOrderBtn">
            Place Order
        </button>


    </div>





    <script type="module" src="Checkout.js"></script>


</body>

</html>
